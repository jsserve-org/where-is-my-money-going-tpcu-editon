name: Publish Docker image to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build & push Docker image (amd64)
    runs-on: blacksmith-4vcpu-ubuntu-2404

    permissions:
      packages: write
      contents: read
      id-token: write

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref_name }}

      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set image version
        id: version
        run: |
          version="${{ github.event.release.tag_name || github.ref_name }}"
          version="$(
            printf '%s' "${version}" |
              sed -E 's/[^A-Za-z0-9_.-]+/-/g; s/^[^A-Za-z0-9_]+//; s/[^A-Za-z0-9_]+$//' |
              cut -c1-120 |
              sed -E 's/[^A-Za-z0-9_]+$//'
          )"
          if [ -z "${version}" ]; then
            echo "Unable to determine image version" >&2
            exit 1
          fi
          echo "IMAGE_VERSION=${version}" >> $GITHUB_ENV
          echo "image_version=${version}" >> $GITHUB_OUTPUT
          echo "${version}" > VERSION

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.GHCR_REPOSITORY }}

      - name: Build & push
        id: build
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_REPOSITORY }}:${{ steps.version.outputs.image_version }}
            ghcr.io/${{ env.GHCR_REPOSITORY }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        run: |
          cosign sign --yes ghcr.io/${{ env.GHCR_REPOSITORY }}@${{ steps.build.outputs.digest }}

      - name: Image summary
        run: |
          echo "### Docker Image Digest (amd64)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${GHCR_REPOSITORY}:${IMAGE_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${GHCR_REPOSITORY}:latest" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
